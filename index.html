<!DOCTYPE html>
<html>
<head>
<title>Shree Shyam Library</title>

<style>
body { font-family: Arial; text-align: center; }

#seats {
  position: relative;
  width: 900px;
  height: 1050px;
  margin: auto;
  border: 3px solid black;
  background: #f9f9f9;
}

.seat {
  position: absolute;
  width: 48px;
  height: 48px;
  background: green;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  cursor: pointer;
}

/* FORM */
#form {
  display: none;
  background: #eee;
  padding: 15px;
  margin: 20px auto;
  border-radius: 10px;
  width: 300px;
}

input, select {
  margin: 5px;
  padding: 8px;
  width: 90%;
}

button {
  margin: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<h2>📚 Shree Shyam Library</h2>

<div id="seats"></div>

<!-- FORM -->
<div id="form">
<h3 id="seatTitle"></h3>

<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="adhar" placeholder="Aadhar">
<input id="shift" placeholder="Shift">

<input id="from" type="date">
<input id="to" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>

<input id="totalFee" placeholder="Total Fee">
<input id="paid" placeholder="Paid">

<button onclick="submitForm()">Save</button>
<button onclick="closeForm()">Close</button>

</div>

<script>

let currentSeat = null;

/* SEAT POSITION */
let pos = {
  1:[20,100],2:[20,160],3:[20,220],4:[20,280],5:[20,340],6:[20,400],

  7:[120,'right'],8:[165,'right'],9:[210,'right'],

  10:[120,230],11:[180,230],12:[240,230],

  13:[120,60],14:[180,60],15:[240,60],

  16:[300,110],17:[300,170],18:[300,230],19:[300,290],

  20:[360,290],21:[360,230],22:[360,170],23:[360,110],
  24:[420,110],25:[420,170],26:[420,230],27:[420,290],

  28:[480,290],29:[480,230],30:[480,170],31:[480,110],
  32:[540,110],33:[540,170],36:[540,230],37:[540,290],

  34:[620,110],35:[620,170],38:[620,230],39:[620,290],
  40:[680,110],41:[680,170],42:[680,230],43:[680,290],

  63:[780,60],64:[840,60]
};

/* RIGHT SIDE */
let y = 300;
let gap = 40;

for(let i=44;i<=62;i++){
  pos[i] = [y, 'right'];
  y += gap;
}

/* RENDER */
for(let i=1;i<=64;i++){
  let p = pos[i];
  if(!p) continue;

  let seat=document.createElement("div");
  seat.className="seat";
  seat.innerText=i;

  seat.style.top=p[0]+"px";

  if(p[1]=='right') seat.style.right="50px";
  else seat.style.left=p[1]+"px";

  seat.onclick=()=>{
    currentSeat=i;
    document.getElementById("form").style.display="block";
    document.getElementById("seatTitle").innerText="Seat No: "+i;
  };

  document.getElementById("seats").appendChild(seat);
}

/* FORM */
function submitForm(){
  alert("Seat "+currentSeat+" Saved ✅");
  closeForm();
}

function closeForm(){
  document.getElementById("form").style.display="none";
}

</script>

</body>
</html>
