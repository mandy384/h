<!DOCTYPE html>
<html>
<head>
  <title>Library Seat System</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    #seats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .seat {
      width: 60px;
      height: 60px;
      margin: 5px;
      background: green;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
    }
    .occupied {
      background: red;
    }
  </style>
</head>

<body>

<h1>📚 Library Seat System</h1>

<div id="seats"></div>

<script>
  let totalSeats = 64; // 👈 ab 64 seats
  let seatsDiv = document.getElementById("seats");

  let savedSeats = JSON.parse(localStorage.getItem("seats")) || {};

  for (let i = 1; i <= totalSeats; i++) {
    let seat = document.createElement("div");
    seat.className = "seat";

    // agar saved data hai
    if (savedSeats[i]) {
      seat.innerText = savedSeats[i].name;
      seat.classList.add("occupied");
    } else {
      seat.innerText = i;
    }

    seat.onclick = function() {
      let name = prompt("Enter name:");

      if (name && name.trim() !== "") {
        seat.innerText = name;
        seat.classList.add("occupied");

        savedSeats[i] = { name: name };
      } else {
        seat.innerText = i;
        seat.classList.remove("occupied");

        delete savedSeats[i];
      }

      localStorage.setItem("seats", JSON.stringify(savedSeats));
    };

    seatsDiv.appendChild(seat);
  }
</script>

</body>
</html>
