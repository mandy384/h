<!DOCTYPE html>
<html>
<head>
  <title>Library Pro Dashboard</title>
  <style>
    body { font-family: Arial; text-align: center; }

    .dashboard {
      background: #222;
      color: white;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
    }

    #seats { display: flex; flex-wrap: wrap; justify-content: center; }

    .seat {
      width: 100px;
      height: 100px;
      margin: 5px;
      background: green;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
    }
    .occupied { background: red; }

    #form, #details {
      display: none;
      background: #eee;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
    }

    input, select { margin: 5px; padding: 5px; width: 90%; }
    button { margin: 5px; padding: 8px; }
  </style>
</head>

<body>

<h2>📚 Library Dashboard</h2>

<div class="dashboard">
  <p id="stats"></p>
</div>

<div id="seats"></div>

<div id="form">
  <h3>Fill Details</h3>
  <input id="name" placeholder="Name"><br>
  <input id="mobile" placeholder="Mobile"><br>
  <input id="totalFee" placeholder="Total Fee"><br>
  <input id="paid" placeholder="Paid Amount"><br>
  <button onclick="saveData()">Save</button>
</div>

<div id="details">
  <p id="showData"></p>
  <button onclick="editData()">Edit</button>
  <button onclick="deleteData()">Reset</button>
</div>

<script>
let totalSeats = 64;
let seatsDiv = document.getElementById("seats");

let savedSeats = JSON.parse(localStorage.getItem("seats")) || {};
let currentSeat = null;

function renderSeats() {
  seatsDiv.innerHTML = "";

  let occupied = 0;
  let totalPaid = 0;
  let totalDue = 0;

  for (let i = 1; i <= totalSeats; i++) {
    let seat = document.createElement("div");
    seat.className = "seat";

    if (savedSeats[i]) {
      seat.innerText = savedSeats[i].name;
      seat.classList.add("occupied");

      occupied++;

      totalPaid += Number(savedSeats[i].paid || 0);
      totalDue += Number(savedSeats[i].due || 0);
    } else {
      seat.innerText = "Seat " + i;
    }

    seat.onclick = function() {
      currentSeat = i;

      if (savedSeats[i]) {
        showDetails(i);
      } else {
        form.style.display = "block";
        details.style.display = "none";
      }
    };

    seatsDiv.appendChild(seat);
  }

  document.getElementById("stats").innerText =
    "Total Seats: " + totalSeats +
    " | Occupied: " + occupied +
    " | Empty: " + (totalSeats - occupied) +
    " | Total Paid: ₹" + totalPaid +
    " | Total Due: ₹" + totalDue;
}

function saveData() {
  let totalFee = Number(totalFeeInput.value);
  let paid = Number(paidInput.value);
  let due = totalFee - paid;

  savedSeats[currentSeat] = {
    name: name.value,
    mobile: mobile.value,
    totalFee,
    paid,
    due
  };

  localStorage.setItem("seats", JSON.stringify(savedSeats));

  form.style.display = "none";
  renderSeats();
}

function showDetails(i) {
  let d = savedSeats[i];

  showData.innerText =
    "Name: " + d.name +
    "\nMobile: " + d.mobile +
    "\nTotal Fee: ₹" + d.totalFee +
    "\nPaid: ₹" + d.paid +
    "\nDue: ₹" + d.due;

  details.style.display = "block";
  form.style.display = "none";
}

function editData() {
  let d = savedSeats[currentSeat];

  name.value = d.name;
  mobile.value = d.mobile;
  totalFeeInput.value = d.totalFee;
  paidInput.value = d.paid;

  form.style.display = "block";
  details.style.display = "none";
}

function deleteData() {
  delete savedSeats[currentSeat];
  localStorage.setItem("seats", JSON.stringify(savedSeats));

  details.style.display = "none";
  renderSeats();
}

let name = document.getElementById("name");
let mobile = document.getElementById("mobile");
let totalFeeInput = document.getElementById("totalFee");
let paidInput = document.getElementById("paid");

renderSeats();
</script>

</body>
</html>
