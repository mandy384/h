<!DOCTYPE html>
<html>
<head>
  <title>Library System + PDF</title>

  <!-- jsPDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }

    .seat {
      width: 90px;
      height: 90px;
      margin: 5px;
      background: green;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
    }

    .complete { background: red; }
    .due { background: orange; }
    .expired { background: skyblue; }

    button { margin: 10px; padding: 10px; }
  </style>
</head>

<body>

<h2>📚 Library System</h2>

<button onclick="downloadPDF()">📄 Download PDF</button>

<div id="seats"></div>

<script>
let totalSeats = 64;
let seatsDiv = document.getElementById("seats");

let savedSeats = JSON.parse(localStorage.getItem("seats")) || {};

function renderSeats() {
  seatsDiv.innerHTML = "";
  let today = new Date().toISOString().split("T")[0];

  for (let i = 1; i <= totalSeats; i++) {
    let seat = document.createElement("div");
    seat.className = "seat";

    if (savedSeats[i]) {
      let d = savedSeats[i];
      seat.innerText = d.name;

      if (d.to && d.to < today) {
        seat.classList.add("expired");
      } else if (d.due > 0) {
        seat.classList.add("due");
      } else {
        seat.classList.add("complete");
      }
    } else {
      seat.innerText = "Seat " + i;
    }

    seatsDiv.appendChild(seat);
  }
}

function downloadPDF() {
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let y = 10;

  doc.text("Library Report", 10, y);
  y += 10;

  let totalPaid = 0;
  let totalDue = 0;

  for (let i in savedSeats) {
    let d = savedSeats[i];

    let text = 
      "Seat " + i +
      " | " + d.name +
      " | Paid: " + d.paid +
      " | Due: " + d.due;

    doc.text(text, 10, y);
    y += 8;

    totalPaid += Number(d.paid || 0);
    totalDue += Number(d.due || 0);

    if (y > 270) {
      doc.addPage();
      y = 10;
    }
  }

  y += 10;
  doc.text("Total Paid: ₹" + totalPaid, 10, y);
  y += 10;
  doc.text("Total Due: ₹" + totalDue, 10, y);

  doc.save("Library_Report.pdf");
}

renderSeats();
</script>

</body>
</html>
