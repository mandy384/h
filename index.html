<!DOCTYPE html>
<html>
<head>
  <title>Library Pro System</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    #seats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .seat {
      width: 120px;
      height: 120px;
      margin: 6px;
      background: green;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
      font-size: 10px;
      text-align: center;
      padding: 5px;
      white-space: pre-line;
    }
    .occupied {
      background: red;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>📚 Library Full Management</h2>

<button onclick="resetSeats()">Reset All</button>

<div id="seats"></div>

<script>
let totalSeats = 20;
let seatsDiv = document.getElementById("seats");

let savedSeats = JSON.parse(localStorage.getItem("seats")) || {};

for (let i = 1; i <= totalSeats; i++) {
  let seat = document.createElement("div");
  seat.className = "seat";

  if (savedSeats[i]) {
    let d = savedSeats[i];
    seat.innerText =
      "Name: " + d.name +
      "\nFather: " + d.father +
      "\nMob: " + d.mobile +
      "\nShift: " + d.shift +
      "\nFrom: " + d.from +
      "\nTo: " + d.to +
      "\nPay: " + d.payment;
    seat.classList.add("occupied");
  } else {
    seat.innerText = "Seat " + i;
  }

  seat.onclick = function() {

    let name = prompt("Name:");
    if (!name) return;

    let father = prompt("Father Name:");
    let mobile = prompt("Mobile No:");
    let adhar = prompt("Aadhar No:");
    let shift = prompt("Shift Time:");
    let from = prompt("Start Date:");
    let to = prompt("End Date:");
    let payment = prompt("Payment (Cash/Online):");

    let today = new Date().toISOString().split("T")[0];

    // due alert
    if (to < today) {
      alert("⚠️ Payment/Date Expired!");
    }

    seat.innerText =
      "Name: " + name +
      "\nFather: " + father +
      "\nMob: " + mobile +
      "\nShift: " + shift +
      "\nFrom: " + from +
      "\nTo: " + to +
      "\nPay: " + payment;

    seat.classList.add("occupied");

    savedSeats[i] = {
      name, father, mobile, adhar, shift, from, to, payment
    };

    localStorage.setItem("seats", JSON.stringify(savedSeats));
  };

  seatsDiv.appendChild(seat);
}

function resetSeats() {
  if (confirm("Reset all seats?")) {
    localStorage.removeItem("seats");
    location.reload();
  }
}
</script>

</body>
</html>
