<!DOCTYPE html>
<html>
<head>
  <title>Library Seats</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    #seats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .seat {
      width: 60px;
      height: 60px;
      margin: 5px;
      background: green;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .occupied {
      background: red;
    }
  </style>
</head>

<body>

<h1>Library Seat</h1>

<div id="seats"></div>

<script>
  let totalSeats = 20;
  let seatsDiv = document.getElementById("seats");

  for (let i = 1; i <= totalSeats; i++) {
    let seat = document.createElement("div");
    seat.className = "seat";
    seat.innerText = i;

    seat.onclick = function() {
      let name = prompt("Enter name:");

      if (name && name.trim() !== "") {
        seat.innerText = name;
        seat.classList.add("occupied");
      } else {
        seat.innerText = i;
        seat.classList.remove("occupied");
      }
    };

    seatsDiv.appendChild(seat);
  }
</script>

</body>
</html>
