<!DOCTYPE html>
<html>
<head>
<title>64 Seat Layout</title>

<style>
body {
  font-family: Arial;
  background: #eee;
  text-align: center;
}

.room {
  position: relative;
  width: 520px;
  height: 1150px;
  margin: auto;
  border: 4px solid black;
  background: #f9f9f9;
}

/* Seat (NO OUTLINE) */
.seat {
  position: absolute;
  width: 50px;
  height: 50px;
  background: #2e7d32;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  cursor: pointer;
  border-radius: 6px;
}

/* Click = booked */
.booked {
  background: red;
}

/* TOP */
#s1{top:20px; left:100px;}
#s2{top:20px; left:160px;}
#s3{top:20px; left:220px;}
#s4{top:20px; left:280px;}
#s5{top:20px; left:340px;}
#s6{top:20px; left:400px;}

/* LEFT */
#s13{top:120px; left:60px;}
#s14{top:180px; left:60px;}
#s15{top:240px; left:60px;}

/* CENTER */
#s10{top:120px; left:230px;}
#s11{top:180px; left:230px;}
#s12{top:240px; left:230px;}

/* RIGHT */
#s7{top:120px; right:60px;}
#s8{top:180px; right:60px;}
#s9{top:240px; right:60px;}

/* MIDDLE */
#s16{top:300px; left:110px;}
#s17{top:300px; left:170px;}
#s18{top:300px; left:230px;}
#s19{top:300px; left:290px;}

/* 20-27 */

#s20{top:370px; left:290px;}

#s24{top:430px; left:110px;}
#s25{top:430px; left:170px;}
#s26{top:430px; left:230px;}
#s27{top:430px; left:290px;}

/* 28-37 */
#s31{top:520px; left:110px;}
#s30{top:520px; left:170px;}
#s29{top:520px; left:230px;}
#s28{top:520px; left:290px;}

#s32{top:580px; left:110px;}
#s33{top:580px; left:170px;}
#s36{top:580px; left:230px;}
#s37{top:580px; left:290px;}

/* 34-43 */
#s34{top:680px; left:110px;}
#s35{top:680px; left:170px;}
#s38{top:680px; left:230px;}
#s39{top:680px; left:290px;}

#s40{top:740px; left:110px;}

/* Entrance */
.entrance {
  position: absolute;
  bottom: 10px;
  left: 210px;
}
</style>
</head>

<body>

<h2>📚 64 Seat Layout</h2>

<div class="room">

<script>
for(let i=1;i<=64;i++){
  document.write(`<div class="seat" id="s${i}">${i}</div>`);
}
</script>

<div class="entrance">Entrance</div>

</div>

<script>
document.querySelectorAll(".seat").forEach(seat=>{
  seat.onclick = ()=> seat.classList.toggle("booked");
});
</script>

</body>
</html>
