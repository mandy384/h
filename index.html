<!DOCTYPE html>
<html>
<head>
<title>64 Seat Layout</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

.room {
  position: relative;
  width: 520px;
  height: 1050px; /* 👉 height bada kiya */
  margin: auto;
  border: 3px solid black;
  background: white;
  overflow: hidden;
}

.seat {
  position: absolute;
  width: 50px;
  height: 50px;
  border: 1px solid black;
  display: flex;
  justify-content: center;
  align-items: center;
  background: lightgreen;
  cursor: pointer;
  font-size: 14px;
}

.booked {
  background: red;
  color: white;
}

/* TOP */
#s1{top:20px; left:100px;}
#s2{top:20px; left:160px;}
#s3{top:20px; left:220px;}
#s4{top:20px; left:280px;}
#s5{top:20px; left:340px;}
#s6{top:20px; left:400px;}

/* RIGHT TOP */
#s7{top:120px; right:20px;}
#s8{top:180px; right:20px;}
#s9{top:240px; right:20px;}

/* CENTER */
#s10{top:120px; left:230px;}
#s11{top:180px; left:230px;}
#s12{top:240px; left:230px;}

/* LEFT */
#s13{top:120px; left:20px;}
#s14{top:180px; left:20px;}
#s15{top:240px; left:20px;}

/* MIDDLE */
#s16{top:300px; left:120px;}
#s17{top:300px; left:180px;}
#s18{top:300px; left:240px;}
#s19{top:300px; left:300px;}

/* 20-27 */
#s20{top:360px; left:300px;}
#s21{top:360px; left:240px;}
#s22{top:360px; left:180px;}
#s23{top:360px; left:120px;}

#s24{top:420px; left:120px;}
#s25{top:420px; left:180px;}
#s26{top:420px; left:240px;}
#s27{top:420px; left:300px;}

/* 28-37 */
#s28{top:500px; left:300px;}
#s29{top:500px; left:240px;}
#s30{top:500px; left:180px;}
#s31{top:500px; left:120px;}

#s32{top:560px; left:120px;}
#s33{top:560px; left:180px;}
#s36{top:560px; left:240px;}
#s37{top:560px; left:300px;}

/* 34-43 */
#s34{top:620px; left:120px;}
#s35{top:620px; left:180px;}
#s38{top:620px; left:240px;}
#s39{top:620px; left:300px;}

#s40{top:680px; left:120px;}
#s41{top:680px; left:180px;}
#s42{top:680px; left:240px;}
#s43{top:680px; left:300px;}

/* LEFT BOTTOM */
#s63{top:800px; left:40px;}
#s64{top:860px; left:40px;}

/* RIGHT COLUMN (FULLY INSIDE NOW) */
#s44{top:300px; right:20px;}
#s45{top:350px; right:20px;}
#s46{top:400px; right:20px;}
#s47{top:450px; right:20px;}
#s48{top:500px; right:20px;}
#s49{top:550px; right:20px;}
#s50{top:600px; right:20px;}
#s51{top:650px; right:20px;}
#s52{top:700px; right:20px;}
#s53{top:750px; right:20px;}
#s54{top:800px; right:20px;}
#s55{top:850px; right:20px;}
#s56{top:900px; right:20px;}

</style>
</head>

<body>

<h2>📚 64 Seat Library Layout</h2>

<div class="room">
<script>
for(let i=1;i<=64;i++){
  document.write(`<div class="seat" id="s${i}">${i}</div>`);
}
</script>
</div>

<script>
document.querySelectorAll(".seat").forEach(seat=>{
  seat.onclick = ()=> seat.classList.toggle("booked");
});
</script>

</body>
</html>
