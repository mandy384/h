<!DOCTYPE html>
<html>
<head>
<title>Wisdom-Nest-Library PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; text-align: center; }

.dashboard {
  background: black;
  color: white;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

#seats {
  display: grid;
  grid-template-columns: repeat(8, 100px);
  gap: 8px;
  justify-content: center;
}

.seat {
  height: 90px;
  background: green;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  cursor: pointer;
  font-size: 11px;
}

.complete { background: red; }
.due { background: orange; }
.expired { background: skyblue; }

#form, #details {
  display: none;
  background: #eee;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

input, select { margin: 5px; padding: 5px; width: 90%; }
button { margin: 5px; padding: 8px; }

.empty { visibility: hidden; }
</style>
</head>

<body>

<h2>📚 Wisdom-Nest-Library</h2>

<div class="dashboard">
<p id="stats"></p>
</div>

<button onclick="downloadPDF()">📄 Full Report</button>

<h3>⚠️ Due / Expired</h3>
<div id="dueList"></div>

<div id="seats"></div>

<!-- FORM -->
<div id="form">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="adhar" placeholder="Aadhar">
<input id="shift" placeholder="Shift">
<input id="from" type="date">
<input id="to" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>

<input id="totalFee" placeholder="Total Fee">
<input id="paid" placeholder="Paid">

<button onclick="saveData()">Save</button>
</div>

<!-- DETAILS -->
<div id="details">
<pre id="showData"></pre>
<button onclick="editData()">Edit</button>
<button onclick="deleteData()">Reset</button>
<button onclick="sendMsg()">📩 SMS</button>
<button onclick="downloadReceipt()">🧾 Receipt</button>
</div>

<script>

const API = "https://69e0a2c429c070e6597bc6bf.mockapi.io/wisdomnestlibrary";

let savedSeats = {};
let currentSeat = null;

const layout = [
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// LOAD
async function loadData(){
  let res = await fetch(API);
  let arr = await res.json();

  savedSeats = {};
  arr.forEach(d=>{
    savedSeats[d.seat] = d;
  });

  renderSeats();
}

// SAVE
async function saveData(){

  let obj={
    seat: currentSeat,
    name: document.getElementById("name").value,
    father: father.value,
    mobile: mobile.value,
    adhar: adhar.value,
    shift: shift.value,
    from: from.value,
    to: to.value,
    payment: payment.value,
    totalFee: Number(totalFee.value||0),
    paid: Number(paid.value||0),
    due: Number(totalFee.value||0) - Number(paid.value||0)
  };

  let res = await fetch(API);
  let arr = await res.json();
  let existing = arr.find(d => d.seat == currentSeat);

  if(existing){
    await fetch(API+"/"+existing.id,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(obj)
    });
  }else{
    await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(obj)
    });
  }

  form.style.display="none";
  loadData();
}

// RENDER
function renderSeats(){
  seats.innerHTML="";

  let occupied=0,totalPaid=0,totalDue=0;
  let cash=0,online=0;
  let totalSeats=60;

  let today=new Date().toISOString().split("T")[0];

  layout.forEach(row=>{
    row.forEach(i=>{
      let seat=document.createElement("div");

      if(i===0){
        seat.className="empty";
      }else{
        seat.className="seat";

        if(savedSeats[i]){
          let d=savedSeats[i];
          seat.innerHTML = `<b>${i}</b><br>${d.name}`;

          if(d.payment=="Cash") cash++;
          else online++;

          if(d.to && d.to<today) seat.classList.add("expired");
          else if(d.due>0) seat.classList.add("due");
          else seat.classList.add("complete");

          occupied++;
          totalPaid+=Number(d.paid||0);
          totalDue+=Number(d.due||0);

        }else{
          seat.innerText="Seat "+i;
        }

        seat.onclick=()=>{
          currentSeat=i;
          if(savedSeats[i]) showDetails(i);
          else form.style.display="block";
        };
      }

      seats.appendChild(seat);
    });
  });

  let empty = totalSeats - occupied;

  stats.innerText=
  `Total Seats: ${totalSeats}
Occupied: ${occupied}
Empty: ${empty}
Paid: ₹${totalPaid}
Due: ₹${totalDue}
Cash: ${cash}
Online: ${online}`;

  updateDueList();
}

function showDetails(i){
let d=savedSeats[i];
showData.innerText=`Seat: ${i}
Name: ${d.name}
Father: ${d.father}
Mobile: ${d.mobile}
Aadhar: ${d.adhar}
Shift: ${d.shift}
From: ${d.from}
To: ${d.to}
Payment: ${d.payment}
Total: ₹${d.totalFee}
Paid: ₹${d.paid}
Due: ₹${d.due}`;
details.style.display="block";
form.style.display="none";
}

function editData(){
let d=savedSeats[currentSeat];
document.getElementById("name").value=d.name;
father.value=d.father;
mobile.value=d.mobile;
adhar.value=d.adhar;
shift.value=d.shift;
from.value=d.from;
to.value=d.to;
payment.value=d.payment;
totalFee.value=d.totalFee;
paid.value=d.paid;
form.style.display="block";
details.style.display="none";
}

function deleteData(){
fetch(API).then(r=>r.json()).then(arr=>{
let item=arr.find(d=>d.seat==currentSeat);
if(item){
fetch(API+"/"+item.id,{method:"DELETE"}).then(loadData);
}
});
details.style.display="none";
}

// 🔥 FINAL SMS FUNCTION
function sendMsg(){
  let d = savedSeats[currentSeat];

  let msg = `📚 Wisdom Nest Library

Hello ${d.name},

Seat No: ${currentSeat}
Shift: ${d.shift}
Time: ${d.from} to ${d.to}

Payment Mode: ${d.payment}
Total Fee: ₹${d.totalFee}
Paid: ₹${d.paid}
Due: ₹${d.due}

⚠️ Kindly clear your pending fee as soon as possible.

----------------------------

📚 विजडम नेस्ट लाइब्रेरी

नमस्ते ${d.name},

सीट नंबर: ${currentSeat}
शिफ्ट: ${d.shift}
समय: ${d.from} से ${d.to}

भुगतान प्रकार: ${d.payment}
कुल फीस: ₹${d.totalFee}
जमा राशि: ₹${d.paid}
बकाया: ₹${d.due}

⚠️ कृपया अपनी बकाया फीस जल्द जमा करें।

----------------------------

🙏 Thank You | धन्यवाद`;

  window.location.href = `sms:${d.mobile}?body=${encodeURIComponent(msg)}`;
}

function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF(),y=10;

for(let i in savedSeats){
let d=savedSeats[i];
doc.text(`Seat ${i} ${d.name} ₹${d.paid}`,10,y);
y+=8;
}
doc.save("report.pdf");
}

function updateDueList(){
dueList.innerHTML="";
for(let i in savedSeats){
let d=savedSeats[i];
if(d.due>0){
let div=document.createElement("div");
div.innerText="Seat "+i+" | "+d.name+" | ₹"+d.due;
dueList.appendChild(div);
}
}
}

loadData();

</script>

</body>
</html>
