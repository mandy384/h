<!DOCTYPE html>
<html>
<head>
  <title>Library Seat Management</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    .row {
      display: flex;
      justify-content: center;
    }
    .seat {
      width: 55px;
      height: 55px;
      margin: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      border-radius: 10px;
      font-size: 12px;
    }
    .empty {
      background-color: green;
    }
    .occupied {
      background-color: red;
    }
    button {
      margin: 15px;
      padding: 10px 20px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📚 Library Seat System</h1>

<button onclick="resetSeats()">Reset All</button>

<div id="seats"></div>

<script>
  let layout = [10,10,10,10,10,14];
  let seatNumber = 1;

  let savedSeats = JSON.parse(localStorage.getItem("seats")) || {};

  let seatsDiv = document.getElementById("seats");

  layout.forEach(row => {
    let rowDiv = document.createElement("div");
    rowDiv.className = "row";

    for (let i = 0; i < row; i++) {
      let seat = document.createElement("div");
      seat.className = "seat";

      let currentSeat = seatNumber;
      let data = savedSeats[currentSeat] || {};

      if (data.status === "occupied") {
        seat.classList.add("occupied");
      } else {
        seat.classList.add("empty");
