<!DOCTYPE html>
<html>
<head>
<title>64 Seat Layout</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

.room {
  position: relative;
  width: 600px;
  height: 900px;
  margin: auto;
  border: 3px solid black;
  background: white;
}

.seat {
  position: absolute;
  width: 40px;
  height: 40px;
  border: 1px solid black;
  display: flex;
  justify-content: center;
  align-items: center;
  background: lightgreen;
  cursor: pointer;
  font-size: 12px;
}

.booked {
  background: red;
  color: white;
}

/* TOP ROW */
#s1{top:20px; left:120px;}
#s2{top:20px; left:170px;}
#s3{top:20px; left:220px;}
#s4{top:20px; left:270px;}
#s5{top:20px; left:320px;}
#s6{top:20px; left:370px;}

/* RIGHT TOP */
#s7{top:120px; right:40px;}
#s8{top:170px; right:40px;}
#s9{top:220px; right:40px;}

/* CENTER */
#s10{top:120px; left:260px;}
#s11{top:170px; left:260px;}
#s12{top:220px; left:260px;}

/* LEFT TOP */
#s13{top:120px; left:40px;}
#s14{top:170px; left:40px;}
#s15{top:220px; left:40px;}

/* MIDDLE LINE */
#s16{top:280px; left:120px;}
#s17{top:280px; left:170px;}
#s18{top:280px; left:220px;}
#s19{top:280px; left:270px;}

/* BLOCK 20-27 */
#s20{top:350px; left:270px;}
#s21{top:350px; left:220px;}
#s22{top:350px; left:170px;}
#s23{top:350px; left:120px;}

#s24{top:400px; left:120px;}
#s25{top:400px; left:170px;}
#s26{top:400px; left:220px;}
#s27{top:400px; left:270px;}

/* BLOCK 28-37 */
#s28{top:500px; left:270px;}
#s29{top:500px; left:220px;}
#s30{top:500px; left:170px;}
#s31{top:500px; left:120px;}

#s32{top:550px; left:120px;}
#s33{top:550px; left:170px;}
#s36{top:550px; left:220px;}
#s37{top:550px; left:270px;}

/* BLOCK 34-43 */
#s34{top:650px; left:120px;}
#s35{top:650px; left:170px;}
#s38{top:650px; left:220px;}
#s39{top:650px; left:270px;}

#s40{top:700px; left:120px;}
#s41{top:700px; left:170px;}
#s42{top:700px; left:220px;}
#s43{top:700px; left:270px;}

/* LEFT BOTTOM */
#s63{top:750px; left:60px;}
#s64{top:800px; left:60px;}

/* RIGHT LONG COLUMN */
#s44{top:280px; right:40px;}
#s45{top:320px; right:40px;}
#s46{top:360px; right:40px;}
#s47{top:400px; right:40px;}
#s48{top:440px; right:40px;}
#s49{top:480px; right:40px;}
#s50{top:520px; right:40px;}
#s51{top:560px; right:40px;}
#s52{top:600px; right:40px;}
#s53{top:640px; right:40px;}
#s54{top:680px; right:40px;}
#s55{top:720px; right:40px;}
#s56{top:760px; right:40px;}
#s57{top:800px; right:40px;}
#s58{top:840px; right:40px;}
#s59{top:880px; right:40px;}
#s60{top:920px; right:40px;}
#s61{top:960px; right:40px;}
#s62{top:1000px; right:40px;}
</style>
</head>

<body>

<h2>📚 64 Seat Library Layout</h2>

<div class="room">

<script>
for(let i=1;i<=64;i++){
  document.write(`<div class="seat" id="s${i}">${i}</div>`);
}
</script>

</div>

<script>
let seats = document.querySelectorAll(".seat");

seats.forEach(seat => {
  seat.addEventListener("click", () => {
    seat.classList.toggle("booked");
  });
});
</script>

</body>
</html>
