<!DOCTYPE html>
<html>
<head>
  <title>Library Seat System</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    .row {
      display: flex;
      justify-content: center;
    }
    .seat {
      width: 55px;
      height: 55px;
      margin: 5px;
      background: green;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
    }
    .occupied {
      background: red;
    }
    button {
      margin: 15px;
      padding: 10px 20px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📚 Library Seat System</h1>

<button onclick="resetSeats()">Reset All</button>

<div id="seats"></div>

<script>
  let layout = [8,8,8,8,8,8,8,8]; // 👈 8 rows = 64 seats
  let seatNumber = 1;

  let savedSeats = JSON.parse(localStorage.getItem("seats")) || {};

  let seatsDiv = document.getElementById("seats");

  layout.forEach(row => {
    let rowDiv = document.createElement("div");
    rowDiv.className = "row";

    for (let i = 0; i < row; i++) {
      let seat = document.createElement("div");
      seat.className = "seat";

      let currentSeat = seatNumber;

      if (savedSeats[currentSeat]) {
        seat.innerText = savedSeats[currentSeat].name;
        seat.classList.add("occupied");
      } else {
        seat.innerText = currentSeat;
      }

      seat.onclick = function() {
        let name = prompt("Enter name:");

        if (name && name.trim() !== "") {
          seat.innerText = name;
          seat.classList.add("occupied");
          savedSeats[currentSeat] = { name: name };
        } else {
          seat.innerText = currentSeat;
          seat.classList.remove("occupied");
          delete savedSeats[currentSeat];
        }

        localStorage.setItem("seats", JSON.stringify(savedSeats));
      };

      rowDiv.appendChild(seat);
      seatNumber++;
    }

    seatsDiv.appendChild(rowDiv);
  });

  function resetSeats() {
    if (confirm("Reset all seats?")) {
      localStorage.removeItem("seats");
      location.reload();
    }
  }
</script>

</body>
</html>
