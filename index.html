<!DOCTYPE html>
<html>
<head>
  <title>Library System Pro</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }

    .seat {
      width: 100px;
      height: 100px;
      margin: 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      background: green;
    }

    .complete { background: red; }
    .due { background: orange; }
    .expired { background: skyblue; }

    .dashboard {
      background: black;
      color: white;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
    }

    #form, #details {
      display: none;
      background: #eee;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
    }

    input { margin: 4px; padding: 6px; }
    button { margin: 4px; padding: 8px; }
  </style>
</head>

<body>

<h2>📚 Library System</h2>

<button onclick="downloadPDF()">📄 Full PDF</button>
<button onclick="monthlyReport()">📊 Monthly</button>

<div class="dashboard">
  <p id="stats"></p>
</div>

<h3>⚠️ Due / Expired</h3>
<div id="dueList"></div>

<div id="seats"></div>

<!-- FORM -->
<div id="form">
  <input id="name" placeholder="Name"><br>
  <input id="father" placeholder="Father Name"><br>
  <input id="aadhaar" placeholder="Aadhaar No"><br>

  <input id="mobile" placeholder="Mobile"><br>
  <input id="from" type="date"><br>
  <input id="to" type="date"><br>
  <input id="totalFee" placeholder="Total Fee"><br>
  <input id="paid" placeholder="Paid"><br>

  <button onclick="saveData()">Save</button>
</div>

<!-- DETAILS -->
<div id="details">
  <pre id="showData"></pre>
  <button onclick="editData()">Edit</button>
  <button onclick="deleteData()">Delete</button>
  <button onclick="sendMsg()">WhatsApp</button>
  <button onclick="receipt()">Receipt</button>
</div>

<script>

let seatsDiv = document.getElementById("seats");
let savedSeats = JSON.parse(localStorage.getItem("seats")) || {};
let currentSeat = null;

function render(){
  seatsDiv.innerHTML = "";

  let today = new Date().toISOString().split("T")[0];
  let occ = 0, paid = 0, due = 0;

  for(let i=1;i<=64;i++){
    let s = document.createElement("div");
    s.className = "seat";

    if(savedSeats[i]){
      let d = savedSeats[i];
      s.innerText = d.name;

      if(d.to && d.to < today) s.classList.add("expired");
      else if(d.due > 0) s.classList.add("due");
      else s.classList.add("complete");

      occ++;
      paid += Number(d.paid || 0);
      due += Number(d.due || 0);
    } else {
      s.innerText = "Seat " + i;
    }

    s.onclick = () => {
      currentSeat = i;
      if(savedSeats[i]) show(i);
      else form.style.display = "block";
    };

    seatsDiv.appendChild(s);
  }

  stats.innerText =
  `Seats:64 | Used:${occ} | Empty:${64-occ} | Paid:₹${paid} | Due:₹${due}`;

  dueListUpdate();
}

function saveData(){
  let tf = Number(totalFee.value);
  let p = Number(paid.value);

  savedSeats[currentSeat] = {
    name: name.value,
    father: father.value,
    aadhaar: aadhaar.value,
    mobile: mobile.value,
    from: from.value,
    to: to.value,
    totalFee: tf,
    paid: p,
    due: tf - p
  };

  localStorage.setItem("seats", JSON.stringify(savedSeats));
  form.style.display = "none";
  render();
}

function show(i){
  let d = savedSeats[i];

  showData.innerText =
`Name: ${d.name}
Father Name: ${d.father}
Aadhaar No: ${d.aadhaar}
Mobile: ${d.mobile}
Paid: ${d.paid}
Due: ${d.due}`;

  details.style.display = "block";
}

function editData(){
  let d = savedSeats[currentSeat];

  name.value = d.name;
  father.value = d.father;
  aadhaar.value = d.aadhaar;
  mobile.value = d.mobile;
  totalFee.value = d.totalFee;
  paid.value = d.paid;

  form.style.display = "block";
}

function deleteData(){
  delete savedSeats[currentSeat];
  localStorage.setItem("seats", JSON.stringify(savedSeats));
  details.style.display = "none";
  render();
}

function sendMsg(){
  let d = savedSeats[currentSeat];
  window.open("https://wa.me/91"+d.mobile+"?text=Due Amount: "+d.due);
}

function dueListUpdate(){
  dueList.innerHTML = "";

  let today = new Date().toISOString().split("T")[0];

  for(let i in savedSeats){
    let d = savedSeats[i];

    if((d.to && d.to < today) || d.due > 0){
      let div = document.createElement("div");
      div.innerText = `Seat ${i} | ${d.name} | Due: ${d.due}`;
      dueList.appendChild(div);
    }
  }
}

// PDF
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF(), y = 10;

  for(let i in savedSeats){
    let d = savedSeats[i];
    doc.text(`Seat ${i} ${d.name} Paid:${d.paid} Due:${d.due}`, 10, y);
    y += 8;
  }

  doc.save("report.pdf");
}

// Monthly
function monthlyReport(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF(), y = 10;
  let m = new Date().getMonth();

  for(let i in savedSeats){
    let d = savedSeats[i];
    if(d.from && new Date(d.from).getMonth() == m){
      doc.text(`${d.name} Paid:${d.paid}`, 10, y);
      y += 8;
    }
  }

  doc.save("monthly.pdf");
}

// Receipt
function receipt(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  let d = savedSeats[currentSeat];

  doc.text("Library Receipt", 10, 10);
  doc.text("Name: "+d.name, 10, 20);
  doc.text("Father: "+d.father, 10, 30);
  doc.text("Aadhaar: "+d.aadhaar, 10, 40);
  doc.text("Paid: "+d.paid, 10, 50);
  doc.text("Due: "+d.due, 10, 60);

  doc.save("receipt.pdf");
}

render();

</script>

</body>
</html>
