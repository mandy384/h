<!DOCTYPE html>
<html>
<head>
  <title>Library System Fix</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }

    .seat {
      width: 100px;
      height: 100px;
      margin: 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      background: green;
    }

    .complete { background: red; }
    .due { background: orange; }
    .expired { background: skyblue; }

    #form, #details {
      display: none;
      background: #eee;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
    }

    input { margin: 4px; padding: 6px; }
    button { margin: 4px; padding: 8px; }
  </style>
</head>

<body>

<h2>📚 Library System</h2>

<div id="seats"></div>

<div id="form">
  <input id="name" placeholder="Name"><br>
  <input id="father" placeholder="Father Name"><br>
  <input id="aadhaar" placeholder="Aadhaar No"><br>
  <input id="mobile" placeholder="Mobile"><br>
  <input id="from" type="date"><br>
  <input id="to" type="date"><br>
  <input id="totalFee" placeholder="Total Fee"><br>
  <input id="paid" placeholder="Paid"><br>

  <button onclick="saveData()">Save</button>
</div>

<div id="details">
  <pre id="showData"></pre>
  <button onclick="editData()">Edit</button>
  <button onclick="deleteData()">Delete</button>
</div>

<script>

let savedSeats = JSON.parse(localStorage.getItem("seats")) || {};
let currentSeat = null;

function render(){
  let seatsDiv = document.getElementById("seats");
  seatsDiv.innerHTML = "";

  for(let i=1;i<=64;i++){
    let s = document.createElement("div");
    s.className = "seat";

    if(savedSeats[i]){
      s.innerText = savedSeats[i].name || "No Name";
    } else {
      s.innerText = "Seat " + i;
    }

    s.onclick = () => {
      currentSeat = i;
      if(savedSeats[i]) show(i);
      else document.getElementById("form").style.display = "block";
    };

    seatsDiv.appendChild(s);
  }
}

function saveData(){
  let tf = Number(document.getElementById("totalFee").value);
  let p = Number(document.getElementById("paid").value);

  savedSeats[currentSeat] = {
    name: document.getElementById("name").value,
    father: document.getElementById("father").value,
    aadhaar: document.getElementById("aadhaar").value,
    mobile: document.getElementById("mobile").value,
    from: document.getElementById("from").value,
    to: document.getElementById("to").value,
    totalFee: tf,
    paid: p,
    due: tf - p
  };

  localStorage.setItem("seats", JSON.stringify(savedSeats));
  document.getElementById("form").style.display = "none";
  render();
}

function show(i){
  let d = savedSeats[i];

  document.getElementById("showData").innerText =
`Name: ${d.name || ""}
Father: ${d.father || ""}
Aadhaar: ${d.aadhaar || ""}
Mobile: ${d.mobile || ""}
Paid: ${d.paid || 0}
Due: ${d.due || 0}`;

  document.getElementById("details").style.display = "block";
}

function editData(){
  let d = savedSeats[currentSeat];

  document.getElementById("name").value = d.name || "";
  document.getElementById("father").value = d.father || "";
  document.getElementById("aadhaar").value = d.aadhaar || "";
  document.getElementById("mobile").value = d.mobile || "";
  document.getElementById("totalFee").value = d.totalFee || "";
  document.getElementById("paid").value = d.paid || "";

  document.getElementById("form").style.display = "block";
}

function deleteData(){
  delete savedSeats[currentSeat];
  localStorage.setItem("seats", JSON.stringify(savedSeats));
  document.getElementById("details").style.display = "none";
  render();
}

render();

</script>

</body>
</html>
