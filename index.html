<!DOCTYPE html>
<html>
<head>
  <title>Library Seat Management</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }
    .row {
      display: flex;
      justify-content: center;
    }
    .seat {
      width: 50px;
      height: 50px;
      margin: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }
    .empty {
      background-color: green;
    }
    .occupied {
      background-color: red;
    }
  </style>
</head>

<body>

<h1>Library Seat Status</h1>

<div id="seats"></div>

<script>
  let layout = [10,10,10,10,10,14];
  let seatNumber = 1;

  let savedSeats = JSON.parse(localStorage.getItem("seats")) || {};

  let seatsDiv = document.getElementById("seats");

  layout.forEach(row => {
    let rowDiv = document.createElement("div");
    rowDiv.className = "row";

    for (let i = 0; i < row; i++) {
      let seat = document.createElement("div");
      seat.className = "seat";

      let currentSeat = seatNumber;
      let data = savedSeats[currentSeat] || {};

      if (data.status === "occupied") {
        seat.classList.add("occupied");
      } else {
        seat.classList.add("empty");
      }

      seat.innerText = data.name ? data.name : currentSeat;

      seat.onclick = function() {
        let name = prompt("Enter student name:");

        if (name && name.trim() !== "") {
          seat.className = "seat occupied";
          seat.innerText = name;

          savedSeats[currentSeat] = {
            status: "occupied",
            name: name
          };
        } else {
          seat.className = "seat empty";
          seat.innerText = currentSeat;

          savedSeats[currentSeat] = {
            status: "empty",
            name: ""
          };
        }

        localStorage.setItem("seats", JSON.stringify(savedSeats));
      };

      rowDiv.appendChild(seat);
      seatNumber++;
    }

    seatsDiv.appendChild(rowDiv);
  });
</script>

</body>
</html>
