<!DOCTYPE html>
<html>
<head>
<title>64 Seat Layout</title>

<style>
body {
  font-family: Arial;
  background: #eee;
  text-align: center;
}

.room {
  position: relative;
  width: 520px;
  height: 1100px; /* 👉 full height */
  margin: auto;
  border: 3px solid black;
  background: #f9f9f9;
}

/* Seat style */
.seat {
  position: absolute;
  width: 48px;
  height: 48px;
  border: 1px solid #333;
  background: #cfe3c8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  cursor: pointer;
}

.booked {
  background: red;
  color: white;
}

/* TOP 1-6 */
#s1{top:20px; left:100px;}
#s2{top:20px; left:150px;}
#s3{top:20px; left:200px;}
#s4{top:20px; left:250px;}
#s5{top:20px; left:300px;}
#s6{top:20px; left:350px;}

/* LEFT 13-15 */
#s13{top:120px; left:40px;}
#s14{top:170px; left:40px;}
#s15{top:220px; left:40px;}

/* CENTER 10-12 */
#s10{top:120px; left:220px;}
#s11{top:170px; left:220px;}
#s12{top:220px; left:220px;}

/* RIGHT 7-9 */
#s7{top:120px; right:40px;}
#s8{top:170px; right:40px;}
#s9{top:220px; right:40px;}

/* 16-19 */
#s16{top:280px; left:100px;}
#s17{top:280px; left:150px;}
#s18{top:280px; left:200px;}
#s19{top:280px; left:250px;}

/* 20-27 */
#s23{top:360px; left:100px;}
#s22{top:360px; left:150px;}
#s21{top:360px; left:200px;}
#s20{top:360px; left:250px;}

#s24{top:410px; left:100px;}
#s25{top:410px; left:150px;}
#s26{top:410px; left:200px;}
#s27{top:410px; left:250px;}

/* RIGHT COLUMN 44-62 */
#s44{top:280px; right:40px;}
#s45{top:330px; right:40px;}
#s46{top:380px; right:40px;}
#s47{top:430px; right:40px;}
#s48{top:480px; right:40px;}
#s49{top:530px; right:40px;}
#s50{top:580px; right:40px;}
#s51{top:630px; right:40px;}
#s52{top:680px; right:40px;}
#s53{top:730px; right:40px;}
#s54{top:780px; right:40px;}
#s55{top:830px; right:40px;}
#s56{top:880px; right:40px;}
#s57{top:930px; right:40px;}
#s58{top:980px; right:40px;}
#s59{top:1030px; right:40px;}
#s60{top:1080px; right:40px;}
#s61{top:1130px; right:40px;}
#s62{top:1180px; right:40px;}

/* 28-37 */
#s31{top:500px; left:100px;}
#s30{top:500px; left:150px;}
#s29{top:500px; left:200px;}
#s28{top:500px; left:250px;}

#s32{top:550px; left:100px;}
#s33{top:550px; left:150px;}
#s36{top:550px; left:200px;}
#s37{top:550px; left:250px;}

/* 34-43 */
#s34{top:650px; left:100px;}
#s35{top:650px; left:150px;}
#s38{top:650px; left:200px;}
#s39{top:650px; left:250px;}

#s40{top:700px; left:100px;}
#s41{top:700px; left:150px;}
#s42{top:700px; left:200px;}
#s43{top:700px; left:250px;}

/* 63-64 */
#s63{top:780px; left:70px;}
#s64{top:830px; left:70px;}

/* Entrance */
.entrance {
  position: absolute;
  bottom: 10px;
  left: 200px;
  font-size: 14px;
}
</style>
</head>

<body>

<h2>📚 64 Seat Layout</h2>

<div class="room">
<script>
for(let i=1;i<=64;i++){
  document.write(`<div class="seat" id="s${i}">${i}</div>`);
}
</script>

<div class="entrance">Entrance</div>

</div>

<script>
document.querySelectorAll(".seat").forEach(seat=>{
  seat.onclick = ()=> seat.classList.toggle("booked");
});
</script>

</body>
</html>
